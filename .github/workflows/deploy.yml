name: Deploy to Cloudflare

on:
  push:
    branches: [main]

# CN-022: explicit least-privilege at workflow scope. The deploy job
# only needs to read the repo (no git push, no release, no PR). Setting
# `contents: read` here overrides any repo-wide default that grants
# write to GITHUB_TOKEN, so a compromised dependency cannot push commits
# or create releases through this workflow's token.
permissions:
  contents: read

# Force Node.js 24 for any JavaScript action whose action.yml still
# declares `using: "node20"`. GitHub deprecated Node 20 actions on
# 2025-09-19 and will force-flip them on 2026-06-02. The only action
# in this workflow still on Node 20 is cloudflare/wrangler-action
# (v3.15.0 — its latest as of 2026-04-15) which Cloudflare hasn't
# bumped yet. Setting the flag here:
#   1. Removes the deprecation banner from every run.
#   2. Validates the action behaves correctly on Node 24 BEFORE the
#      auto-flip — far less risk than discovering an incompatibility
#      the morning of 2026-06-02.
# Drop this env block once Cloudflare ships a wrangler-action that
# declares `using: "node24"`.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # CN-021: every action pinned to a full commit SHA, with the human-
      # readable version tag in a trailing comment. Tags are mutable —
      # SHAs are not — so even if a maintainer's account is compromised
      # and the tag is moved (cf. tj-actions/changed-files Mar 2025), CI
      # keeps running the audited code we pinned to.
      #
      # All actions on Node 24 — GitHub deprecated Node 20 actions in
      # 2025 and will force-upgrade them in June 2026. Bumped checkout
      # v4 → v6 and setup-node v4 → v6 to preempt the auto-bump. Also
      # bumped wrangler-action v3.14.0 → v3.15.0 (still v3, just newer
      # patch; no breaking change to inputs).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Workflow does not push back to git, so don't leave the
          # token attached to .git/config where a later step could pick
          # it up.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      # Cache pnpm's content-addressed store so a clean runner can skip
      # the actual download step on `pnpm install`. The store dir on
      # Linux runners lives outside the repo (~/.local/share/pnpm/store
      # by default), so we ask pnpm directly. Key includes the lockfile
      # hash → any dep change forces a fresh download. Saves ~30s/run.
      - name: Resolve pnpm store dir
        run: echo "PNPM_STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Cache pnpm store
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.PNPM_STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # CN-020: single workspace install covers root + worker. Worker
      # is now declared in pnpm-workspace.yaml; the previous separate
      # `npm ci` step against worker/package-lock.json (a second
      # lockfile in a second package manager) has been removed.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Cache Next's incremental build artifacts. Next manages
      # invalidation internally based on file content hashes inside
      # .next/cache, so the cache key only needs to bump when the
      # dependency tree (lockfile) does — restore-keys handles the
      # "warm but stale" path for all other commits. Saves ~20s/run on
      # warm cache, no-op on cold.
      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('next.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      # Catches `export const runtime` in template/error/loading/not-found/
      # default/global-error — Next.js segment config doesn't apply there
      # and putting it on template.tsx hung production for ~40 min. Run as
      # its own script (not via `pnpm lint`) so we don't depend on the
      # eslint flat-config currently being usable.
      - name: Runtime-misuse guard
        run: pnpm lint:runtime

      # Worker deploy is best-effort: it requires CLOUDFLARE_API_TOKEN to have
      # Workers Scripts:Edit + User Details:Read. If the token only has Pages
      # perms the step fails; Pages still ships. Deploy the worker manually
      # with `cd worker && pnpm dlx wrangler deploy` until the token is widened.
      - name: Deploy Worker (sergioluque-cms)
        continue-on-error: true
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy
          # The action defaults to `npm install` inside workingDirectory.
          # Worker is now part of the pnpm workspace and its deps are
          # already installed at the repo root, so skip — otherwise npm
          # tries to bootstrap a parallel install and fails on the
          # missing package-lock.json.
          packageManager: pnpm

      # NEXT_PUBLIC_* env vars are inlined at build time, so they must be
      # available to both `pnpm build` and `next-on-pages`. Set values in
      # GitHub → Settings → Secrets and variables → Actions → Variables.
      # Both are safe as plain variables (no secrets):
      #   - NEXT_PUBLIC_GA_ID   : G-XXXXXXXXXX (Google Analytics ID).
      #   - NEXT_PUBLIC_SITE_URL: canonical site URL used by sitemap.ts
      #     and robots.ts (e.g. https://sergioluque.com). If unset, the
      #     code falls back to https://sergioluque.com hard-coded.
      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      - name: Build for Cloudflare Pages
        run: pnpm dlx @cloudflare/next-on-pages@1
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      # The Pages project (sergioluque-web) was bootstrapped manually and
      # exists in Cloudflare. The previous workflow had a `pages project
      # create` step gated by `continue-on-error: true` so it'd no-op on
      # subsequent runs — but `wrangler pages project create` exits 1 when
      # the project already exists, which painted the step red on every
      # green deploy and was easy to misread as a real failure. Removed.
      # If the project ever needs to be re-bootstrapped, do it once via:
      #   wrangler pages project create sergioluque-web --production-branch main

      # Cloudflare's Pages API rejects commit messages containing certain
      # non-ASCII characters (em-dashes, middle-dots, multiplication signs,
      # smart quotes, etc.) with `Invalid commit message [code: 8000111]`.
      # Override the auto-detected git message with the commit SHA so the
      # API never sees Unicode the operator might write in a real message.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy .vercel/output/static --project-name sergioluque-web --branch main --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message=${{ github.sha }}

      # Production smoke test — fails fast if a deploy ships a broken SSR
      # (the original symptom: 103 Early Hints with no body, every dynamic
      # page hangs at the edge). Pages CDN propagation is multi-region and
      # not atomic — PR #18 deployed cleanly, smoke test passed at +10s with
      # all routes 200, then production degraded ~2 min later as edges with
      # an inconsistent worker/asset bundle started serving 103+hang. So
      # this gate runs in two phases:
      #   1. Initial 90s grace, then a first probe.
      #   2. Two further probes at 30s intervals (so the test spans ~2.5min)
      #      to catch the case where one edge reports 200 while another
      #      reports 103 mid-propagation. Use a `?cb=<sha>-<i>` cache-buster
      #      on every request so we measure the new deploy, not stale CDN.
      # If ANY phase fails for ANY route, the workflow fails — and because
      # the deploy itself already happened, the operator must roll back via
      # a revert PR (the documented playbook).
      - name: Smoke test production
        run: |
          set -u
          BASE="https://sergioluque-web.pages.dev"
          ROUTES="/ /listen /news /bio /contact"
          SHA="${{ github.sha }}"

          probe() {
            local phase="$1"
            local total_fail=0
            for path in $ROUTES; do
              local cb="?cb=${SHA:0:7}-${phase}"
              local url="$BASE$path$cb"
              local ok=0
              for attempt in 1 2 3; do
                local status size
                status=$(curl -sS --max-time 12 -o /tmp/body.$$ \
                  -w "%{http_code}" "$url" || echo 000)
                size=$(wc -c < /tmp/body.$$ 2>/dev/null || echo 0)
                echo "phase=$phase attempt=$attempt path=$path status=$status size=$size"
                if [ "$status" = "200" ] && [ "$size" -gt 1000 ]; then
                  ok=1; break
                fi
                sleep 4
              done
              if [ "$ok" -ne 1 ]; then
                echo "::error::Phase $phase: route $path failed"
                total_fail=$((total_fail+1))
              fi
            done
            rm -f /tmp/body.$$
            return $total_fail
          }

          # Phase 1: initial 90s grace, then probe.
          echo "::group::Phase 1 (after 90s grace)"
          sleep 90
          probe 1 || exit 1
          echo "::endgroup::"

          # Phase 2: second wave at +30s.
          echo "::group::Phase 2 (+30s)"
          sleep 30
          probe 2 || exit 1
          echo "::endgroup::"

          # Phase 3: third wave at +30s.
          echo "::group::Phase 3 (+30s)"
          sleep 30
          probe 3 || exit 1
          echo "::endgroup::"

          echo "all 3 phases passed for all 5 routes"
