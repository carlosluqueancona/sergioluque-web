name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Worker dependencies
        run: npm ci
        working-directory: worker

      # Catches `export const runtime` in template/error/loading/not-found/
      # default/global-error — Next.js segment config doesn't apply there
      # and putting it on template.tsx hung production for ~40 min. Run as
      # its own script (not via `pnpm lint`) so we don't depend on the
      # eslint flat-config currently being usable.
      - name: Runtime-misuse guard
        run: pnpm lint:runtime

      # Worker deploy is best-effort: it requires CLOUDFLARE_API_TOKEN to have
      # Workers Scripts:Edit + User Details:Read. If the token only has Pages
      # perms the step fails; Pages still ships. Deploy the worker manually
      # with `cd worker && pnpm dlx wrangler deploy` until the token is widened.
      - name: Deploy Worker (sergioluque-cms)
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          command: deploy

      # NEXT_PUBLIC_* env vars are inlined at build time, so they must be
      # available to both `pnpm build` and `next-on-pages`. Set values in
      # GitHub → Settings → Secrets and variables → Actions → Variables.
      # Both are safe as plain variables (no secrets):
      #   - NEXT_PUBLIC_GA_ID   : G-XXXXXXXXXX (Google Analytics ID).
      #   - NEXT_PUBLIC_SITE_URL: canonical site URL used by sitemap.ts
      #     and robots.ts (e.g. https://sergioluque.com). If unset, the
      #     code falls back to https://sergioluque.com hard-coded.
      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      - name: Build for Cloudflare Pages
        run: pnpm dlx @cloudflare/next-on-pages@1
        env:
          NEXT_PUBLIC_GA_ID: ${{ vars.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}

      # The Pages project (sergioluque-web) was bootstrapped manually and
      # exists in Cloudflare. The previous workflow had a `pages project
      # create` step gated by `continue-on-error: true` so it'd no-op on
      # subsequent runs — but `wrangler pages project create` exits 1 when
      # the project already exists, which painted the step red on every
      # green deploy and was easy to misread as a real failure. Removed.
      # If the project ever needs to be re-bootstrapped, do it once via:
      #   wrangler pages project create sergioluque-web --production-branch main

      # Cloudflare's Pages API rejects commit messages containing certain
      # non-ASCII characters (em-dashes, middle-dots, multiplication signs,
      # smart quotes, etc.) with `Invalid commit message [code: 8000111]`.
      # Override the auto-detected git message with the commit SHA so the
      # API never sees Unicode the operator might write in a real message.
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .vercel/output/static --project-name sergioluque-web --branch main --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message=${{ github.sha }}

      # Production smoke test — fails fast if a deploy ships a broken SSR
      # (the original symptom: 103 Early Hints with no body, every dynamic
      # page hangs at the edge). Pages CDN propagation is multi-region and
      # not atomic — PR #18 deployed cleanly, smoke test passed at +10s with
      # all routes 200, then production degraded ~2 min later as edges with
      # an inconsistent worker/asset bundle started serving 103+hang. So
      # this gate runs in two phases:
      #   1. Initial 90s grace, then a first probe.
      #   2. Two further probes at 30s intervals (so the test spans ~2.5min)
      #      to catch the case where one edge reports 200 while another
      #      reports 103 mid-propagation. Use a `?cb=<sha>-<i>` cache-buster
      #      on every request so we measure the new deploy, not stale CDN.
      # If ANY phase fails for ANY route, the workflow fails — and because
      # the deploy itself already happened, the operator must roll back via
      # a revert PR (the documented playbook).
      - name: Smoke test production
        run: |
          set -u
          BASE="https://sergioluque-web.pages.dev"
          ROUTES="/ /listen /news /bio /contact"
          SHA="${{ github.sha }}"

          probe() {
            local phase="$1"
            local total_fail=0
            for path in $ROUTES; do
              local cb="?cb=${SHA:0:7}-${phase}"
              local url="$BASE$path$cb"
              local ok=0
              for attempt in 1 2 3; do
                local status size
                status=$(curl -sS --max-time 12 -o /tmp/body.$$ \
                  -w "%{http_code}" "$url" || echo 000)
                size=$(wc -c < /tmp/body.$$ 2>/dev/null || echo 0)
                echo "phase=$phase attempt=$attempt path=$path status=$status size=$size"
                if [ "$status" = "200" ] && [ "$size" -gt 1000 ]; then
                  ok=1; break
                fi
                sleep 4
              done
              if [ "$ok" -ne 1 ]; then
                echo "::error::Phase $phase: route $path failed"
                total_fail=$((total_fail+1))
              fi
            done
            rm -f /tmp/body.$$
            return $total_fail
          }

          # Phase 1: initial 90s grace, then probe.
          echo "::group::Phase 1 (after 90s grace)"
          sleep 90
          probe 1 || exit 1
          echo "::endgroup::"

          # Phase 2: second wave at +30s.
          echo "::group::Phase 2 (+30s)"
          sleep 30
          probe 2 || exit 1
          echo "::endgroup::"

          # Phase 3: third wave at +30s.
          echo "::group::Phase 3 (+30s)"
          sleep 30
          probe 3 || exit 1
          echo "::endgroup::"

          echo "all 3 phases passed for all 5 routes"
