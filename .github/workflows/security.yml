# Security CI workflow — Cyber Neo CN-029.
#
# Three independent scans run on every PR + push to main + weekly cron:
#   1. osv-scanner   — full dep-tree CVE scan against the OSV database
#   2. pnpm audit    — npm advisory database
#   3. gitleaks      — secret detection across the working tree
#
# DESIGN NOTE — runs without security-events:write
# -----------------------------------------------
# An earlier iteration of this workflow used the upstream reusable
# workflows for osv-scanner and gitleaks-action, both of which upload
# SARIF to the Security tab and therefore require
# `permissions: security-events: write`. That permission is silently
# clamped to read-only when the workflow is triggered by Dependabot,
# so every Dependabot PR (which is the population that most needs the
# scan) failed at startup with `startup_failure` before any job code
# ran. Switched to direct CLI invocation: scanners exit non-zero on a
# finding, the run fails, the operator reads the log. No SARIF upload,
# only contents:read needed, works uniformly for every actor.
#
# All third-party actions are SHA-pinned per CN-021.

name: Security scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC (~03:00 Mexico City).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  osv-scanner:
    name: OSV-Scanner (CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      # Download the official osv-scanner binary directly. Pinned to
      # v2.3.5 release. Fails the job on any vulnerability that has a
      # known fix; advisories without a fix surface in the log only.
      - name: Install osv-scanner
        run: |
          set -euo pipefail
          VERSION="v2.3.5"
          URL="https://github.com/google/osv-scanner/releases/download/${VERSION}/osv-scanner_linux_amd64"
          curl -sSL --fail "$URL" -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Scan
        # --config picks up osv-scanner.toml at the repo root, which
        # documents the known-accepted advisories (CN-009 dev/build
        # chain). New CVEs that are NOT in that allowlist still fail
        # the job.
        run: osv-scanner --recursive --config=osv-scanner.toml ./

  pnpm-audit:
    name: pnpm audit (advisory check)
    runs-on: ubuntu-latest
    # Informational — pnpm audit can surface dev-only transitives we
    # accept (cf. CN-009). Keep this from blocking the gating
    # osv-scanner job above.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
      - name: Install pnpm
        run: npm install -g pnpm@10
      - name: Audit
        run: pnpm audit --audit-level=high
        # No `pnpm install` first — pnpm audit reads pnpm-lock.yaml
        # directly and a fresh install per run wastes CI minutes.

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so gitleaks scans past commits — the Cyber
          # Neo audit found zero committed secrets, this catches any
          # future regression including force-pushed branches.
          fetch-depth: 0
          persist-credentials: false
      # Download the official gitleaks binary instead of the
      # gitleaks-action wrapper (which requires security-events:write
      # for SARIF upload — see DESIGN NOTE above).
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.21.2"
          URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -sSL --fail "$URL" -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version
      - name: Scan
        # `detect` walks the working tree + git history. Exit 1 on
        # findings, exit 0 on clean. --redact ensures the log doesn't
        # echo the literal secret if one is found.
        run: gitleaks detect --redact --no-banner --verbose
