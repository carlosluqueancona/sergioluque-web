name = "sergioluque-cms"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
# Keep the workers.dev URL alive alongside the custom domain — every
# existing media URL in D1, plus the front-end CMS_API_URL, points at
# the workers.dev hostname. Disabling it would 404 the whole site
# until every URL is migrated.
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "sergioluque-db"
database_id = "dc6c7575-9577-479d-b484-5642d15e1d48"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "sergioluque-media"

# Rate limiting for /admin/login. 10 attempts / 60s per (IP, email)
# composite key. The Env type marks this binding optional so a deploy
# without rate limiting (free tier, or before this binding is
# provisioned in the Cloudflare dashboard) still works — the login
# handler simply falls through to its in-handler 250 ms delay only.
#
# Namespace IDs are local identifiers — pick any number per binding.
# Cloudflare docs: https://developers.cloudflare.com/workers/runtime-apis/bindings/rate-limit/
[[unsafe.bindings]]
name = "LOGIN_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 10, period = 60 }

[vars]
ALLOWED_ORIGINS = "https://sergioluque.com,https://www.sergioluque.com,https://sergioluque-web.pages.dev"
# Public base URL for media — what the worker writes into the DB when
# uploads succeed and what the public site fetches images/audio/PDFs
# from. Bound to the custom domain below so the URLs no longer expose
# the workers.dev subdomain.
MEDIA_PUBLIC_URL = "https://media.sergioluque.com"

# Custom domain binding. Cloudflare auto-creates the DNS record (CNAME
# under the sergioluque.com zone) and provisions the SSL cert on
# deploy. Requires the zone to already be in this Cloudflare account
# — which it is (Pages "sergioluque-web" is already on it).
[[routes]]
pattern = "media.sergioluque.com"
custom_domain = true
